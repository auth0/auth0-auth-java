name: Create GitHub Release

on:
  push:
    branches:
      - chore/migrate-rl-scanner-to-useable-action  # TEMPORARY: remove after RL scanner debugging
  pull_request:
    types:
      - closed
  workflow_dispatch:

permissions:
  contents: write
  id-token: write # This is required for requesting the JWT

### TODO: Replace instances of './.github/workflows/' w/ `auth0/dx-sdk-actions/workflows/` and append `@latest` after the common
### `dx-sdk-actions` repo is made public.
### TODO: Also remove `get-prerelease`, `get-release-notes`, `get-version`, `maven-publish`, `release-create`, and
### `tag-exists` actions from this repo's .github/actions folder once the repo is public.
### TODO: Also remove `java-release` workflow from this repo's .github/workflows
### folder once the repo is public.

jobs:
  rl-scanner:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.merged && startsWith(github.event.pull_request.head.ref, 'release/'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Build artifact
        run: |
          ./gradlew assemble check --continue --console=plain
          tar -czvf auth0-springboot-api.tgz *

      - name: Get version
        id: get_version
        uses: ./.github/actions/get-version

      - name: Run RL Scanner
        uses: auth0/devsecops-tooling/.github/actions/rl-scan@main
        with:
          artifact-name: "${{ github.event.repository.name }}"
          artifact-path: "${{ github.workspace }}/auth0-springboot-api.tgz"
          version: ${{ steps.get_version.outputs.version }}
          RLSECURE_LICENSE: ${{ secrets.RLSECURE_LICENSE }}
          RLSECURE_SITE_KEY: ${{ secrets.RLSECURE_SITE_KEY }}
          SIGNAL_HANDLER_TOKEN: ${{ secrets.SIGNAL_HANDLER_TOKEN }}
          SIGNAL_HANDLER_DOMAIN: ${{ secrets.SIGNAL_HANDLER_DOMAIN }}
          PRODSEC_TOOLS_ARN: ${{ secrets.PRODSEC_TOOLS_ARN }}
          PRODSEC_TOOLS_USER: ${{ secrets.PRODSEC_TOOLS_USER }}
          PRODSEC_TOOLS_TOKEN: ${{ secrets.PRODSEC_TOOLS_TOKEN }}
          PRODSEC_PYTHON_TOOLS_REPO: ${{ secrets.PRODSEC_PYTHON_TOOLS_REPO }}

  release:
    if: false # TEMPORARY: disabled during RL scanner debugging — re-enable before merge
    uses: ./.github/workflows/java-release.yml
    needs: rl-scanner
    with:
      java-version: "17.0.9-tem"
    secrets:
      ossr-username: ${{ secrets.OSSR_USERNAME }}
      ossr-token: ${{ secrets.OSSR_TOKEN }}
      signing-key: ${{ secrets.SIGNING_KEY }}
      signing-password: ${{ secrets.SIGNING_PASSWORD }}
      github-token: ${{ secrets.GITHUB_TOKEN }}
